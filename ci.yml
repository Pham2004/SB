name: RELIC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # cho phép chạy thủ công từ tab Actions
  schedule:
    - cron: '0 2 * * *'  # optional: chạy hàng ngày lúc 2h sáng UTC

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private RELIC repo
        uses: actions/checkout@v4
        with:
          repository: USERNAME/RELIC           # ⚠️ sửa thành username/tên repo private của bạn
          token: ${{ secrets.RELIC_TOKEN }}
          path: relic                          # clone vào thư mục ./relic
          ref: main                            # hoặc master, tuỳ nhánh của bạn

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./relic
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: List RELIC files (verify clone)
        working-directory: ./relic
        run: ls -la

      - name: Run tests
        working-directory: ./relic
        run: |
          # Thay bằng lệnh test thật của bạn, ví dụ:
          # pytest tests/
          # hoặc: python -m unittest discover
          echo "Chạy test ở đây"

      - name: Run build/smoke check
        working-directory: ./relic
        run: |
          # Ví dụ: python main.py --dry-run
          echo "Build check ở đây"