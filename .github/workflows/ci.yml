name: RELIC MAS Parallel - mas_fs, mas_jd, mas_st

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of runs per problem (default: 3)'
        required: false
        default: '3'
        type: string
      budget_per_batch:
        description: 'MCTS budget per batch (higher = better quality, slower)'
        required: false
        default: '10'
        type: string
  schedule:
    - cron: '0 2 * * *'

jobs:
  relic-mas-parallel:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    strategy:
      matrix:
        problem: [mas_fs, mas_jd, mas_st]
      max-parallel: 3  # Run up to 3 problems in parallel

    steps:
      - name: Checkout SB repo
        uses: actions/checkout@v4

      - name: Checkout private RELIC repo
        uses: actions/checkout@v4
        with:
          repository: Pham2004/RELIC
          token: ${{ secrets.RELIC_TOKEN }}
          path: relic
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./relic
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RELIC MAS for ${{ matrix.problem }}
        working-directory: ./relic
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p results
          iterations=${{ inputs.iterations || '3' }}

          for exp in $(seq 1 $iterations); do
            echo "=========================================="
            echo "Experiment $exp/$iterations: ${{ matrix.problem }}"
            echo "Budget: ${{ inputs.budget_per_batch || '10' }} per batch"
            echo "=========================================="

            export HYDRA_OUT_DIR="results/${{ matrix.problem }}-exp$exp"
            mkdir -p "$HYDRA_OUT_DIR"

            python main.py \
              problem=${{ matrix.problem }} \
              framework.hyperparams.budget_per_batch=${{ inputs.budget_per_batch || '10' }} \
              hydra.run.dir="$HYDRA_OUT_DIR"

            echo "Experiment $exp/$iterations completed"
            echo ""
          done

      - name: Upload all experiments for ${{ matrix.problem }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relic-mas-${{ matrix.problem }}-all
          path: |
            relic/results/${{ matrix.problem }}-exp*/relic/
            relic/outputs/
          retention-days: 30

      - name: Display summary for ${{ matrix.problem }}
        if: always()
        working-directory: ./relic
        run: |
          iterations=${{ inputs.iterations || '3' }}
          for exp in $(seq 1 $iterations); do
            summary="results/${{ matrix.problem }}-exp$exp/relic/summary.json"
            if [ -f "$summary" ]; then
              echo "Summary Exp$exp for ${{ matrix.problem }}:"
              python -m json.tool < "$summary" | head -20
              echo ""
            fi
          done
