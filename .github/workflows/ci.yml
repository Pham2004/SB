name: RELIC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private RELIC repo
        uses: actions/checkout@v4
        with:
          repository: USERNAME/RELIC           # ⚠️ sửa thành username/tên repo private của bạn
          token: ${{ secrets.RELIC_TOKEN }}
          path: relic
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./relic
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: List RELIC files (verify clone)
        working-directory: ./relic
        run: ls -la

      - name: Run tests
        working-directory: ./relic
        run: |
          echo "Chạy test ở đây"

      - name: Run build/smoke check
        working-directory: ./relic
        run: |
          echo "Build check ở đây"
